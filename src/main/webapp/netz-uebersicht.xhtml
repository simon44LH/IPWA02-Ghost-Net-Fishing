<ui:composition template="/WEB-INF/templates/layout.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:p="http://primefaces.org/ui">

    <ui:define name="inhalt">
        <h2>Netzuebersicht und Bergungsverwaltung</h2>

        <h:form id="uebersichtForm">

            <p:panel header="Bergende Person" style="margin-bottom: 20px; max-width: 700px;">
                <p:panelGrid columns="2" layout="grid"
                             columnClasses="ui-grid-col-4,ui-grid-col-8">

                    <p:outputLabel for="personAuswahl" value="Vorhandene Person"/>
                    <p:selectOneMenu id="personAuswahl"
                                     value="#{netzUebersichtBean.ausgewaehltePersonId}">
                        <f:selectItem itemLabel="Neue Person anlegen" itemValue="#{null}"/>
                        <f:selectItems value="#{netzUebersichtBean.bergendePersonen}"
                                       var="bp" itemLabel="#{bp.name}" itemValue="#{bp.id}"/>
                    </p:selectOneMenu>

                    <p:outputLabel for="neuName" value="Name (neue Person)"/>
                    <p:inputText id="neuName" value="#{netzUebersichtBean.neuerPersonName}"/>

                    <p:outputLabel for="neuTelefon" value="Telefonnummer"/>
                    <p:inputText id="neuTelefon" value="#{netzUebersichtBean.neuerPersonTelefon}"/>
                </p:panelGrid>
            </p:panel>

            <p:dataTable value="#{netzUebersichtBean.netze}" var="netz"
                         emptyMessage="Es wurden noch keine Geisternetze erfasst.">

                <p:column headerText="ID">
                    <h:outputText value="#{netz.id}"/>
                </p:column>

                <p:column headerText="Breitengrad">
                    <h:outputText value="#{netz.breitengrad}"/>
                </p:column>

                <p:column headerText="Laengengrad">
                    <h:outputText value="#{netz.laengengrad}"/>
                </p:column>

                <p:column headerText="Groesse in qm">
                    <h:outputText value="#{netz.geschaetzteGroesse}"/>
                </p:column>

                <p:column headerText="Status" style="min-width: 130px;">
                    <h:outputText value="#{netz.status.bezeichnung}"/>
                </p:column>

                <p:column headerText="Meldende Person">
                    <h:outputText value="#{netz.melderAnzeige}"/>
                </p:column>

                <p:column headerText="Bergende Person">
                    <h:outputText value="#{netz.bergendePerson.name}"/>
                </p:column>

                <p:column headerText="Aktionen" style="width: 160px;">
                    <div style="display: flex; flex-direction: column; gap: 5px; align-items: flex-start;">
                        <p:commandButton value="Bergen"
                                         action="#{netzUebersichtBean.fuerBergungEintragen(netz)}"
                                         rendered="#{netzUebersichtBean.istBergbar(netz)}"
                                         update="@form meldungen" style="width: 130px;"/>

                        <p:commandButton value="Geborgen"
                                         action="#{netzUebersichtBean.alsGeborgenMelden(netz)}"
                                         rendered="#{netzUebersichtBean.istGeborgenMeldbar(netz)}"
                                         update="@form meldungen" style="width: 130px;"/>

                        <p:commandButton value="Verschollen"
                                         action="#{netzUebersichtBean.alsVerschollenMelden(netz)}"
                                         rendered="#{netzUebersichtBean.istVerschollenMeldbar(netz)}"
                                         update="@form meldungen" style="width: 130px;"/>
                    </div>
                </p:column>
            </p:dataTable>
        </h:form>
    </ui:define>
</ui:composition>
